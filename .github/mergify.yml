pull_request_rules:
  - name: add module/cicd label
    conditions:
      - files‾=^¥.circleci/.*$
      - files‾=^¥.github/.*$
      - files‾=^¥scripts/.*$
    actions:
      label:
        add:
          - module/cicd

  - name: add module/docker label
    conditions:
      - files‾=^docker/.*$
    actions:
      label:
        add:
          - module/docker

  - name: add module/docs label
    conditions:
      - files‾=^docs/.*$
    actions:
      label:
        add:
          - module/docs

  - name: add module/example label
    conditions:
      - files‾=^examples/.*$
    actions:
      label:
        add:
          - module/example

  - name: add module/thirdparty label
    conditions:
      - files‾=^extern/.*$
    actions:
      label:
        add:
          - module/thirdparty

  - name: add module/api label
    conditions:
      - files‾=^include/.*$
    actions:
      label:
        add:
          - module/api

  - name: add module/attr label
    conditions:
      - files‾=^src/attr/.*$
    actions:
      label:
        add:
          - module/attr

  - name: add module/datacell label
    conditions:
      - files‾=^src/datacell/.*$
      - files‾=^src/io/.*$
      - files‾=^src/quantization/.*$
    actions:
      label:
        add:
          - module/datacell

  - name: add module/index label
    conditions:
      - files‾=^src/index/.*$
    actions:
      label:
        add:
          - module/index

  - name: add module/simd label
    conditions:
      - files‾=^src/simd/.*$
    actions:
      label:
        add:
          - module/simd

  - name: add module/pyvsag label
    conditions:
      - files‾=^python/.*$
      - files‾=^python_bindings/.*$
    actions:
      label:
        add:
          - module/pyvsag

  - name: add module/tools label
    conditions:
      - files‾=^tools/.*$
    actions:
      label:
        add:
          - module/tools

  - name: add module/testing label
    conditions:
      - files‾=^tests/.*$
    actions:
      label:
        add:
          - module/testing
  - name: require kind label
    conditions:
      - -label‾=^kind/
    actions:
      post_check:
        title: kind label missing
        summary: PR must have a `kind/*` label (e.g. kind/feature, kind/bug, kind/chore, kind/docs).
        conclusion: failure

  - name: require version label
    conditions:
      - -label‾=^version/
    actions:
      post_check:
        title: version label missing
        summary: PR must have a `version/*` label (e.g. version/major, version/minor, version/patch).
        conclusion: failure

merge_protections_settings:
  reporting_method: check-runs
